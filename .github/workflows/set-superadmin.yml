name: Set Super Admin

# Cria/atualiza o super-admin da plataforma com uma senha provisória (troca
# forçada no 1º login). Roda direto do runner: o Neon é publicamente acessível,
# então não há VPC pra entrar nem imagem pra buildar — só `tsx
# scripts/set-superadmin.ts` com `DATABASE_URL` vindo dos secrets do GitHub
# Environment. A senha provisória gerada aparece nos logs deste run.
on:
  workflow_dispatch:
    inputs:
      email:
        description: E-mail do super-admin
        type: string
        required: true
      environment:
        description: Ambiente alvo
        type: choice
        required: true
        options:
          - production
          - homologation

permissions:
  contents: read

jobs:
  set-superadmin:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Set super-admin
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPERADMIN_EMAIL: ${{ inputs.email }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "❌ Secret DATABASE_URL não configurado no environment '${{ inputs.environment }}'"
            exit 1
          fi
          npx tsx scripts/set-superadmin.ts
