name: Run DB Migrations

# Migrations rodam direto do runner do GitHub Actions: o Neon é publicamente
# acessível (TLS + credenciais na connection string), então não há VPC pra
# entrar nem imagem pra buildar. `DATABASE_URL` vem dos secrets do GitHub
# Environment escolhido. Manual, por ambiente. Rodar ANTES do deploy quando
# uma migration nova precisa existir no banco.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Ambiente alvo
        type: choice
        required: true
        options:
          - homologation
          - production

permissions:
  contents: read

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "❌ Secret DATABASE_URL não configurado no environment '${{ inputs.environment }}'"
            exit 1
          fi
          npx tsx scripts/migrate.ts
