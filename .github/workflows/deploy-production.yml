name: Deploy Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
        run: |
          docker build --target runner \
            --build-arg NEXT_PUBLIC_TURNSTILE_SITE_KEY="$NEXT_PUBLIC_TURNSTILE_SITE_KEY" \
            -t "$REGISTRY/autostand:$SHA" -t "$REGISTRY/autostand:latest" .
          docker push "$REGISTRY/autostand:$SHA"
          docker push "$REGISTRY/autostand:latest"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition autostand \
            --query taskDefinition \
            --region sa-east-1 > task-definition.json

      - name: Render task definition with new image and secrets
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: autostand
          image: ${{ steps.login-ecr.outputs.registry }}/autostand:${{ github.sha }}
          environment-variables: |
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_TRUST_HOST=true
            PLATFORM_DOMAIN=${{ secrets.PLATFORM_DOMAIN }}
            PLATFORM_HOSTS=${{ secrets.PLATFORM_HOSTS }}
            DB_HOST=autostand-postgres.cvm00qaemt5n.sa-east-1.rds.amazonaws.com
            DB_PORT=5432
            DB_USER=autostand
            DB_NAME=autostand_prod
            DB_SECRET_ARN=arn:aws:secretsmanager:sa-east-1:507099297746:secret:rds!db-72a3e592-94b9-4b22-a105-10a65262ee9b-EGH0WV
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
            CDN_URL=${{ secrets.CDN_URL }}
            UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
            MERCADOPAGO_WEBHOOK_SECRET=${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
            MERCADOPAGO_PLAN_BASICO=${{ secrets.MERCADOPAGO_PLAN_BASICO }}
            MERCADOPAGO_PLAN_PRO=${{ secrets.MERCADOPAGO_PLAN_PRO }}
            MERCADOPAGO_PLAN_PREMIUM=${{ secrets.MERCADOPAGO_PLAN_PREMIUM }}
            GOOGLE_GENERATIVE_AI_API_KEY=${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
            AI_MODEL=${{ secrets.AI_MODEL }}

      # DB_PASSWORD (secret do ECS) continua como fallback de start. A senha
      # corrente é resolvida em RUNTIME via DB_SECRET_ARN (Secrets Manager), o
      # que exige o taskRoleArn abaixo — sem ele o container não tem credencial
      # AWS. Também removemos qualquer DATABASE_URL herdada do task def anterior.
      - name: Set task role + DB_PASSWORD fallback + drop legacy DATABASE_URL
        id: final-task-def
        env:
          RENDERED: ${{ steps.task-def.outputs.task-definition }}
        run: |
          jq '(.containerDefinitions[0].environment) |= map(select(.name != "DATABASE_URL"))
              | (.containerDefinitions[0].secrets) = [
                  {"name": "DB_PASSWORD", "valueFrom": "arn:aws:secretsmanager:sa-east-1:507099297746:secret:rds!db-72a3e592-94b9-4b22-a105-10a65262ee9b-EGH0WV:password::"}
                ]
              | .taskRoleArn = "arn:aws:iam::507099297746:role/ecsTaskRole-autostand"' "$RENDERED" > final-task-def.json
          echo "task-definition=final-task-def.json" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.final-task-def.outputs.task-definition }}
          service: autostand-web
          cluster: autostand
          wait-for-service-stability: true
