name: Deploy Production

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: sa-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/autostand:$SHA" -t "$REGISTRY/autostand:latest" .
          docker push "$REGISTRY/autostand:$SHA"
          docker push "$REGISTRY/autostand:latest"

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition autostand \
            --query taskDefinition \
            --region sa-east-1 > task-definition.json

      - name: Render task definition with new image and secrets
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: autostand
          image: ${{ steps.login-ecr.outputs.registry }}/autostand:${{ github.sha }}
          environment-variables: |
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            AUTH_TRUST_HOST=true
            PLATFORM_DOMAIN=${{ secrets.PLATFORM_DOMAIN }}
            PLATFORM_HOSTS=${{ secrets.PLATFORM_HOSTS }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_S3_REGION=${{ secrets.AWS_S3_REGION }}
            CDN_URL=${{ secrets.CDN_URL }}
            UPSTASH_REDIS_REST_URL=${{ secrets.UPSTASH_REDIS_REST_URL }}
            UPSTASH_REDIS_REST_TOKEN=${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
            TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
            MERCADOPAGO_ACCESS_TOKEN=${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
            MERCADOPAGO_WEBHOOK_SECRET=${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
            MERCADOPAGO_PLAN_BASICO=${{ secrets.MERCADOPAGO_PLAN_BASICO }}
            MERCADOPAGO_PLAN_PRO=${{ secrets.MERCADOPAGO_PLAN_PRO }}
            MERCADOPAGO_PLAN_PREMIUM=${{ secrets.MERCADOPAGO_PLAN_PREMIUM }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            AI_MODEL=${{ secrets.AI_MODEL }}

      # A app lê apenas DATABASE_URL (lib/db/client.ts). Removemos sobras da
      # migração Turso e da abordagem antiga de credenciais por partes (DB_*),
      # incluindo o secret DB_PASSWORD do Secrets Manager, que ninguém usa.
      - name: Strip legacy DB/Turso vars
        id: clean-task-def
        env:
          RENDERED: ${{ steps.task-def.outputs.task-definition }}
        run: |
          jq '
            (.containerDefinitions[0].environment) |= map(select(
                (.name | IN("TURSO_DATABASE_URL","TURSO_AUTH_TOKEN","DB_HOST","DB_PORT","DB_USER","DB_NAME")) | not))
            | (.containerDefinitions[0].secrets) |= ((. // []) | map(select(.name != "DB_PASSWORD")))
          ' "$RENDERED" > clean-task-def.json
          echo "task-definition=clean-task-def.json" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.clean-task-def.outputs.task-definition }}
          service: autostand-web
          cluster: autostand
          wait-for-service-stability: true
